name: road_data_logger
description: A sensor fusion data collector for pothole detection.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Core Hardware
  camera: ^0.11.0
  geolocator: ^11.0.0
  sensors_plus: ^5.0.0

  # Networking & Config
  http: ^1.2.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0  # <--- This was missing/unresolved

  # Backend & Maps
  supabase_flutter: ^2.3.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # IMPORTANT: This allows the app to read the .env file
  assets:
    - .env